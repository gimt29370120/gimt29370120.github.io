<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>單字練習</title>
<style>
  body { font-family:sans-serif; text-align:center; padding:50px; }
  #word { font-size:2em; margin:20px; }
  #input { font-size:1.5em; padding:5px; }
  #startBtn { font-size:1.2em; padding:10px 20px; }
  #info { font-size:1.2em; color:#333; margin-top:10px; }
  #controls { font-size:2em;margin-bottom:20px; }
  #qIndex { font-size:1.5em; padding:5px; }

/* Firefox */
input[type=number] {
  -moz-appearance: textfield;
}
.number-control {
  display: inline-flex;
  align-items: center;
}

.number-control button {
  font-size: 1.5em;
  padding: 5px 10px;
}

</style>
</head>

<body>
<h1>單字練習</h1>

<div id="controls">
  <!-- level 選單 -->
  <label><input type="checkbox" value="level1" checked> level1</label>
  <label><input type="checkbox" value="level2"> level2</label>
  <label><input type="checkbox" value="level3"> level3</label>
  <label><input type="checkbox" value="level4"> level4</label>
  <label><input type="checkbox" value="level5"> level5</label>
  <label><input type="checkbox" value="level6"> level6</label>
  <br><br>
  <button id="startBtn">開始</button>
  <br/>

  <!-- 題號 -->
  題號：<br/>
  <div class="number-control">
  <button onclick="changeNum(-1);">◀</button>
  <input type="text" id="qIndex" value="1" min="1" style="width:120px;">
    <button onclick="changeNum(1);">▶</button>
  </div>
</div>


<div id="word"></div>
<input type="text" id="input" placeholder="輸入詞語" disabled>
<div id="info"></div>
<script>
function changeNum(delta) {
  const input = document.getElementById("qIndex");
  let value = parseInt(input.value) || 1;
  value += delta;

  if (value < 1) value = 1;

  input.value = value;

  showWord();
input.addEventListener("input", () => {
  // 只保留數字
  input.value = input.value.replace(/\D/g, '');

  // 避免空值
  if (input.value === '') input.value = 1;

});
}
</script>

{"word":"urgency","pos":"n","meaning":"緊急;迫切;急事"},{"word":"urine","pos":"n","meaning":"尿"},{"word":"usher","pos":"n","meaning":"(劇場等的"},{"word":"utensil","pos":"n","meaning":"器皿;用具"},{"word":"utility","pos":"n","meaning":"效用;實用;公用事業"},{"word":"utmost","pos":"n","meaning":"極限;極度;最大可能"},{"word":"vaccine","pos":"n","meaning":"疫苗"},{"word":"validity","pos":"n","meaning":"確實;有效性"},{"word":"vanilla","pos":"n","meaning":"香草精"},{"word":"variable","pos":"n","meaning":"可變物;可變因素"},{"word":"variation","pos":"n","meaning":"變化;變異"},{"word":"vendor","pos":"n","meaning":"小販"},{"word":"verge","pos":"n","meaning":"邊沿;邊緣"},{"word":"version","pos":"n","meaning":"譯文;版本"},{"word":"vet","pos":"n","meaning":"獸醫; 老兵"},{"word":"veteran","pos":"n","meaning":"富有經驗的人;退役軍人"},{"word":"veterinarian","pos":"n","meaning":"獸醫"},{"word":"vibration","pos":"n","meaning":"顫動;振動;震動"},{"word":"vice","pos":"n","meaning":"惡;罪行;惡習"},{"word":"victor","pos":"n","meaning":"勝利者"},{"word":"villa","pos":"n","meaning":"別墅;(城郊"},{"word":"vineyard","pos":"n","meaning":"葡萄園"},{"word":"vitality","pos":"n","meaning":"活力;生命力"},{"word":"vocal","pos":"n","meaning":"母音;濁音;聲樂作品"},{"word":"vocation","pos":"n","meaning":"行業;天職"},{"word":"vogue","pos":"n","meaning":"風行;時髦事物(人物"},{"word":"vomit","pos":"n","meaning":"嘔吐;嘔吐物"},{"word":"wardrobe","pos":"n","meaning":"衣櫃;(個人的"},{"word":"warfare","pos":"n","meaning":"戰爭;衝突;鬥爭"},{"word":"warranty","pos":"n","meaning":"保證書;保單"},{"word":"windshield","pos":"n","meaning":"(汽車等的"},{"word":"wrench","pos":"n","meaning":"猛扭;扳手;痛苦"},{"word":"wrestle","pos":"n","meaning":"摔角;角力;搏鬥"},{"word":"Xerox","pos":"n","meaning":"複印件"},{"word":"zeal","pos":"n","meaning":"熱心;熱誠"}]
};

let shuffledWords = [];
let currentIndex = 0;

const startBtn = document.getElementById('startBtn');
const wordDiv = document.getElementById('word');
const input = document.getElementById('input');
const infoDiv = document.getElementById('info');
const qIndexInput = document.getElementById('qIndex');

// 固定亂數
function seededRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

// 取得勾選的單字
function getSelectedWords() {
  const checked = document.querySelectorAll('input[type=checkbox]:checked');
  let result = [];

  checked.forEach(cb => {
    if (wordList[cb.value]) {
      result = result.concat(wordList[cb.value]);
    }
  });

  return result;
}

// 每日固定排序
function getDailyShuffledWords(list) {
  const date = new Date();
  const seed = parseInt(`${date.getFullYear()}${date.getMonth()+1}${date.getDate()}`);

  let tempList = [...list];
  let shuffled = [];

  while (tempList.length > 0) {
    let rand = seededRandom(seed + shuffled.length);
    let index = Math.floor(rand * tempList.length);
    shuffled.push(tempList.splice(index, 1)[0]);
  }
  return shuffled;
}

// 顯示題目
function showWord() {
  if (shuffledWords.length === 0) {
    wordDiv.textContent = "請先選擇 level 並按下開始";
    return;
  }

  currentIndex = parseInt(qIndexInput.value) - 1;

  if (currentIndex < 0 || currentIndex >= shuffledWords.length) {
    wordDiv.textContent = "超出範圍";
    return;
  }

  const item = shuffledWords[currentIndex];
  if (!item) return;
  wordDiv.textContent = `${item.word}　${item.pos}.`;
  input.value = "";
  infoDiv.textContent = "";
  input.focus();
}

// 開始
function startGame() {
  const selected = getSelectedWords();
  shuffledWords = getDailyShuffledWords(selected);

  input.disabled = false;
  showWord();
}

// 顯示解釋（按 Enter）
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const item = shuffledWords[currentIndex];
    if (!item) return;

    infoDiv.textContent = `${item.word}｜${item.pos}.｜${item.meaning}`;
  }
});

// → 下一題
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') {
    qIndexInput.value = parseInt(qIndexInput.value) + 1;
    showWord();
  }
});

// 題號改變
qIndexInput.addEventListener('input', showWord);

// level 改變 → 重新開始排序並更新題目
document.querySelectorAll('input[type=checkbox]').forEach(cb => {
  cb.addEventListener('change', () => {
    const selected = getSelectedWords();
    shuffledWords = getDailyShuffledWords(selected);
    showWord();
  });
});

startBtn.addEventListener('click', startGame);
</script>
