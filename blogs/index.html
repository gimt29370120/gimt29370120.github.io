<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>頁面</title>
<style>
body{
 margin:0;
 padding:0;
 background-color:#c3c3c3;
}
.site-wrap{
 width:95%;
 max-width:1200px;
 margin:0 auto;
 background-color:#fff;
 z-index:1001;
}
.site-header{
 width:100%;
 background-size: 100% auto;
}
main{
 width:95%;
 max-width:1200px;
 margin:0 auto;
 background-color:#fff;
}
</style>
</head>
<body>
 <div class="site-wrap">
 <header class="site-header">
  <div id="menu-warp"></div>
 </header>
 </div>
 <main>
  <div id="index" style="width:90%;height:100%;"></div>
 </main>
 <script>
  fetch("/menu-warp.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("menu-warp").innerHTML = data;
  });
  const urlParams = new URLSearchParams(window.location.search);
  fetch("/blogs/"+urlParams.get("p")+".htm")
  .then(response => response.text())
  .then(data => {
    document.getElementById("index").innerHTML = data;
  });
 </script>
</body>
</html>
